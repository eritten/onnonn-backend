version: "3.9"
services:
  backend:
    build: .
    ports:
      - "4000:4000"
    env_file:
      - .env
    depends_on:
      - mongodb
      - redis
    volumes:
      - .:/app
  mongodb:
    image: mongo:8
    ports:
      - "27017:27017"
    volumes:
      - mongodb-data:/data/db
  redis:
    image: redis:7
    ports:
      - "6379:6379"
  bullboard:
    build: .
    command: node src/server.js
    env_file:
      - .env
    depends_on:
      - redis
      - mongodb
    ports:
      - "4100:4000"
volumes:
  mongodb-data:
